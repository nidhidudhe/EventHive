<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | EventHive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Create Event ✨</h1>
                <p style="color: var(--text-muted)">Add a new experience to the hive</p>
            </div>
            <a href="index.html" class="btn btn-danger">🔙 Back to Home</a>
        </header>

        <div class="form-container">
            <form id="eventForm">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="name" placeholder="Enter catchy event name" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="desc" rows="4" placeholder="What is this event about?" required></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Venue ID</label>
                        <input type="number" id="venue" placeholder="e.g. 1" required>
                        <small style="color: var(--text-muted); font-size: 0.7rem">See setup_db.sql for IDs</small>
                    </div>
                    <div class="form-group">
                        <label>Category ID</label>
                        <input type="number" id="cat" placeholder="e.g. 1" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Organiser ID</label>
                    <input type="number" id="org" placeholder="e.g. 1" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem; font-size: 1.1rem">
                    🚀 Launch Event
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000';

        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                event_name: document.getElementById('name').value,
                description: document.getElementById('desc').value,
                venue_id: parseInt(document.getElementById('venue').value),
                organiser_id: parseInt(document.getElementById('org').value),
                category_id: parseInt(document.getElementById('cat').value)
            };

            try {
                const btn = e.target.querySelector('button');
                btn.innerText = 'Creating...';
                btn.disabled = true;

                await axios.post(`${API_BASE}/events`, data);
                
                alert('Event Created Successfully! 🎉');
                window.location.href = 'index.html';
            } catch (err) {
                console.error(err);
                alert(err.response?.data?.error || 'Failed to create event. Make sure the IDs exist in the database.');
                const btn = e.target.querySelector('button');
                btn.innerText = '🚀 Launch Event';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
