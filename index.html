<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHive | Full Management Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar with exact table names -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>EventHive 🎉</h2>
            </div>
            <ul class="nav-links">
                <li onclick="switchSection('event')"><i class="fas fa-calendar"></i> Events</li>
                <li onclick="switchSection('User')"><i class="fas fa-users"></i> Users</li>
                <li onclick="switchSection('booking')"><i class="fas fa-file-invoice-dollar"></i> Bookings</li>
                <li onclick="switchSection('ticket')"><i class="fas fa-ticket-alt"></i> Tickets</li>
                <li onclick="switchSection('payment')"><i class="fas fa-credit-card"></i> Payments</li>
                <hr style="opacity: 0.1; margin: 0.5rem 0">
                <li onclick="switchSection('venue')"><i class="fas fa-hotel"></i> Venues</li>
                <li onclick="switchSection('category')"><i class="fas fa-tags"></i> Categories</li>
                <li onclick="switchSection('organizer')"><i class="fas fa-user-tie"></i> Organizers</li>
                <li onclick="switchSection('sponsor')"><i class="fas fa-handshake"></i> Sponsors</li>
                <li onclick="switchSection('event_sponsor')"><i class="fas fa-link"></i> Event Sponsors</li>
                <hr style="opacity: 0.1; margin: 0.5rem 0">
                <li onclick="switchSection('vendor')"><i class="fas fa-truck-loading"></i> Vendors</li>
                <li onclick="switchSection('staff')"><i class="fas fa-user-shield"></i> Staff</li>
                <li onclick="switchSection('schedule')"><i class="fas fa-clock"></i> Schedules</li>
            </ul>
        </nav>

        <main class="content">
            <header class="content-header">
                <div>
                    <h1 id="section-title">All Events</h1>
                    <p id="section-desc">Manage your existing PostgreSQL database</p>
                </div>
                <div id="header-actions">
                    <button id="add-btn" class="btn btn-primary" onclick="openUniModal()"><i class="fas fa-plus"></i>Add
                        Record</button> <!--➕ Add Record-->
                </div>
            </header>

            <section id="events-grid" class="grid"></section>

            <section id="table-view" style="display: none;">
                <div class="card" style="padding: 0; overflow-x: auto;">
                    <table class="data-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Universal Add Modal -->
    <div id="uniModal" class="booking-modal">
        <div class="modal-content" style="width: 500px">
            <h2 id="modal-title">Register New Entry</h2>
            <form id="uniForm" style="margin-top: 1.5rem">
                <div id="form-fields"></div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1"><svg width="16px" height="16px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M18.1716 1C18.702 1 19.2107 1.21071 19.5858 1.58579L22.4142 4.41421C22.7893 4.78929 23 5.29799 23 5.82843V20C23 21.6569 21.6569 23 20 23H4C2.34315 23 1 21.6569 1 20V4C1 2.34315 2.34315 1 4 1H18.1716ZM4 3C3.44772 3 3 3.44772 3 4V20C3 20.5523 3.44772 21 4 21L5 21L5 15C5 13.3431 6.34315 12 8 12L16 12C17.6569 12 19 13.3431 19 15V21H20C20.5523 21 21 20.5523 21 20V6.82843C21 6.29799 20.7893 5.78929 20.4142 5.41421L18.5858 3.58579C18.2107 3.21071 17.702 3 17.1716 3H17V5C17 6.65685 15.6569 8 14 8H10C8.34315 8 7 6.65685 7 5V3H4ZM17 21V15C17 14.4477 16.5523 14 16 14L8 14C7.44772 14 7 14.4477 7 15L7 21L17 21ZM9 3H15V5C15 5.55228 14.5523 6 14 6H10C9.44772 6 9 5.55228 9 5V3Z" fill="#ffffffff"></path> </g></svg> Save Record</button>
                    <button type="button" class="btn btn-danger" onclick="closeUniModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
